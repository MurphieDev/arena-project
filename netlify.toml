[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Scheduled function — runs automatically every 30 minutes
# This checks pending tips against real match results server-side
[functions."check-tips-scheduled"]
  schedule = "*/30 * * * *"
